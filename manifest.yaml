# Template System Manifest
# Machine-readable dependency graph for the solid-ai-templates
# composition engine. See SPEC.md for the full specification.
#
# Fields:
#   id          — unique identifier across all layers
#   file        — path relative to repo root
#   description — one-line summary (used by sync script)
#   depends_on  — list of IDs this template extends
#   label       — human-readable name (stacks only, for interview)
#   layer       — classification (stacks only, for README table)
#   produces    — output filename (output entries only)

version: "1.0"

base:
  - id: base-git
    file: base/git.md
    description: Committer identity, commits, branching, PR workflow, versioning
  - id: base-docs
    file: base/docs.md
    description: Rule language, documentation standards, ADR, diagrams, docs-as-code
  - id: base-quality
    file: base/quality.md
    description: Architecture, code style, security, testing
  - id: base-review
    file: base/review.md
    description: Peer review priority, MUST/SHOULD checklists, deviation rules
  - id: base-testing
    file: base/testing.md
    description: Test pyramid, coverage thresholds, naming conventions
  - id: base-devsecops
    file: base/devsecops.md
    description: SAST, SCA, SBOM, secret detection, license compliance
  - id: base-release
    file: base/release.md
    description: Semver, version bump propagation, backward compat, cut-over
  - id: base-cicd
    file: base/cicd.md
    description: Pipeline stages, triggers, environments, IaC, deployment
  - id: base-cicd-patterns
    file: base/cicd-patterns.md
    description: Reusable CI/CD patterns — gate, path filter, fan-out, caching, matrix
    depends_on: [base-cicd]
  - id: base-containers
    file: base/containers.md
    description: Dockerfile, runtime security, resource limits, Kubernetes
  - id: base-readme
    file: base/readme.md
    description: README structure, badges, quick start, contribution guide
  - id: base-deployment
    file: base/deployment.md
    description: Deployment targets (cloud/hybrid/offline), certs, LB, registries, secrets
  - id: base-typescript
    file: base/typescript.md
    description: Type design, naming, strictness — applies to all TypeScript projects
    depends_on: [base-quality]
  - id: base-data-quality
    file: base/data-quality.md
    description: Data sourcing, completeness, freshness, scoring — data-heavy projects
  - id: base-issues
    file: base/issues.md
    description: Issue templates — epic, task, bug, incident, spike
  - id: base-scope
    file: base/scope.md
    description: Scope guard, session protocol, drift prevention
  - id: base-quality-gates
    file: base/quality-gates.md
    description: Three-layer gate model (editor, pre-commit, CI), thresholds
    depends_on:
      [base-quality, base-git, base-testing, base-devsecops, base-cicd]
  - id: base-ai-workflow
    file: base/ai-workflow.md
    description: AI-assisted development lifecycle, work item hierarchy
  - id: base-360
    file: base/360.md
    description: 360-degree project analysis — four stakeholder perspectives, grading

platform:
  - id: platform-github
    file: platform/github.md
    description: CodeQL, GitHub Actions, gitleaks action, push protection
    depends_on: [base-quality-gates]
  - id: platform-gitlab
    file: platform/gitlab.md
    description: Semgrep OSS, GitLab CI/CD, gitleaks CLI
    depends_on: [base-quality-gates]

frontend:
  - id: frontend-ux
    file: frontend/ux.md
    description: UX principles, WCAG 2.1 AA, responsive breakpoints
    depends_on: [base-quality]
  - id: frontend-quality
    file: frontend/quality.md
    description: CSS conventions, performance, SEO & analytics
    depends_on: [base-quality]
  - id: frontend-static-site
    file: frontend/static-site.md
    description: Abstract SSG rules — content, assets, SEO
    depends_on:
      [base-git, base-docs, base-quality, frontend-ux, frontend-quality]

backend:
  - id: backend-config
    file: backend/config.md
    description: Env vars, secrets, fail-fast validation
  - id: backend-http
    file: backend/http.md
    description: URI design, methods, headers, HATEOAS, auth, errors
  - id: backend-api
    file: backend/api.md
    description: API-first, OpenAPI, versioning, deprecation, pagination
    depends_on: [backend-http]
  - id: backend-database
    file: backend/database.md
    description: Migrations, transactions, no raw SQL, connection pooling
  - id: backend-caching
    file: backend/caching.md
    description: Cache-aside, TTL, invalidation, resilience, stampede
  - id: backend-auth
    file: backend/auth.md
    description: Authn/authz, JWT, RBAC, sessions, API keys
    depends_on: [backend-http]
  - id: backend-jobs
    file: backend/jobs.md
    description: Background jobs, idempotency, retry, DLQ, scheduling
  - id: backend-concurrency
    file: backend/concurrency.md
    description: Threads vs. processes vs. async, shared state, structured concurrency
  - id: backend-messaging
    file: backend/messaging.md
    description: Brokers, producers, consumers, schema, DLQ, observability
  - id: backend-grpc
    file: backend/grpc.md
    description: Proto design, status codes, interceptors, health check
    depends_on: [backend-auth, backend-observability]
  - id: backend-microservices
    file: backend/microservices.md
    description: Service boundaries, inter-service comms, saga, contract testing
    depends_on: [backend-http, backend-api, backend-messaging]
  - id: backend-errors
    file: backend/errors.md
    description: Classification, propagation, recovery, external failures
    depends_on: [backend-http, backend-observability]
  - id: backend-features
    file: backend/features.md
    description: Feature flags, rollout strategy, experimentation
  - id: backend-observability
    file: backend/observability.md
    description: Log levels, log format, health check, error visibility
  - id: backend-monitoring
    file: backend/monitoring.md
    description: Key metrics, thresholds, alerts, dashboards, incidents
    depends_on: [backend-observability]
  - id: backend-quality
    file: backend/quality.md
    description: Layered architecture, security, performance, API stability
    depends_on: [base-quality]
  - id: backend-templating
    file: backend/templating.md
    description: Server-side rendering, partials, escaping, caching, forms, testing

